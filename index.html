<!DOCTYPE html>
<html lang="en">

  <!-- =========================-->
  <!-- THIS IS THE HEAD SECTION -->
  <!-- =========================-->
  <head>
    <meta charset="UTF-8"> <!--***Common Charater Setting for the page-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--***To match screensizeof the used device-->

    <title>MyJournal | Official</title>
    
    <!--stylesheet setting for the page:-->
    <link rel="stylesheet" href="style.css"><!--will open the CSS file in this folder-->
  </head>

  <!-- =========================-->
  <!-- THIS IS THE BODY SECTION -->
  <!-- =========================-->
  <body>
    <!--== START: Container 1: Title == -->
    <div class="container">
      <h1>📖 Personal Journal Pro</h1>
    <div class="subtitle">Capture thoughts, goals and reflections</div>
    <!--== END: Container 1: Title ==-->

    <!-- START: Date Input -->
    <input type="datetime-local" id="dateInput">
    <!-- END: Date Input -->

    <!-- START: Category Dropdown -->
    <select id="categoryInput">
    <option>📋Daily Log</option>
    <option>🙈🙉🙊Emotional Outlet</option>
    <option>📌Goal Tracking</option>
    <option>🖼️Creative Space</option>
    <option>🧘‍♂️Self-Reflection</option>
    </select>
    <!-- END: Category Dropdown -->

    <!-- START: Entry Input -->
    <textarea id="entryInput" placeholder="Write your thoughts..."></textarea>
    <!-- END: Entry Input -->

    <!-- START: Save Button -->
    <button id="saveBtn" class="primary" onclick="saveEntry()">Save Entry</button>
    <!-- END: Save Button -->

    <!-- START: Search Bar -->
    <input type="text" id="searchBar" placeholder="🔍 Search..." onkeyup="filterEntries()">
    <!-- END: Search Bar -->

    <!-- START: Toolbar with Export Buttons -->
    <div class="toolbar">

    <button class="secondary" onclick="exportCSV()">Export CSV</button>
    <button class="secondary" onclick="importCSV()">Import CSV</button>

    <input
        type="file"
        id="importFile"
        accept=".csv"
        style="display:none"
    >

</div>
    <!-- END: Toolbar with Export Buttons -->

    <!-- START: Stats and Entries Table -->
    <div class="stats" id="entryCount">0 entries</div>
    <table>
    <thead><tr><th>Date</th><th>Category</th><th>Entry</th><th>Actions</th></tr></thead>
    <tbody id="tbody"></tbody>
   </table>
    </div>
    <!-- END: Stats and Entries Table -->

    <!-- Link to the JavaScript file -->
   <script src="script.js"></script>
    <!-- This will open the JavaScript file in this folder and run the code inside it -->

  </body>
  <!-- ===END OF BODY=== -->

</html>
<!-- ===END OF HTML=== -->
